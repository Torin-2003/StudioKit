name: Build StudioKit

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller cython setuptools

      - name: Bundle FFmpeg
        run: |
          mkdir -p ffmpeg_bin
          cp $(which ffmpeg) ffmpeg_bin/ffmpeg
          cp $(which ffprobe) ffmpeg_bin/ffprobe

      - name: Compile Cython extensions
        run: python build_cython.py build_ext --inplace

      - name: Verify compiled extensions exist
        run: |
          ls hypecutter/*.so || ls hypecutter/*.pyd
          ls *.so || ls *.pyd
          ls scene_manager/*.so || ls scene_manager/*.pyd

      - name: Build Mac app
        run: pyinstaller StudioKit.spec

      - name: Run smoke test (Mac)
        run: python .github/workflows/smoke_test.py

      - name: In-bundle self-test (Mac) — yt-dlp merge + render pipeline
        env:
          STUDIOKIT_SELFTEST: "1"
        timeout-minutes: 10
        run: |
          ./dist/StudioKit.app/Contents/MacOS/StudioKit

      - name: Zip Mac app
        run: |
          cd dist
          zip -r StudioKit-mac.zip StudioKit.app

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudioKit-mac
          path: dist/StudioKit-mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller cython setuptools

      - name: Bundle FFmpeg (static build, no DLLs)
        shell: pwsh
        run: |
          # gyan.dev static builds: single ffmpeg.exe/ffprobe.exe with no DLL deps
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract
          $ffmpegExe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeExe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path ffmpeg_bin | Out-Null
          Copy-Item $ffmpegExe.FullName ffmpeg_bin\ffmpeg.exe
          Copy-Item $ffprobeExe.FullName ffmpeg_bin\ffprobe.exe
          # Verify the binary runs standalone (no DLL deps)
          .\ffmpeg_bin\ffmpeg.exe -version | Select-Object -First 1

      - name: Compile Cython extensions
        run: python build_cython.py build_ext --inplace

      - name: Verify compiled extensions exist
        run: |
          dir hypecutter\*.pyd
          dir *.pyd
          dir scene_manager\*.pyd

      - name: Build Windows exe
        run: pyinstaller StudioKit.spec

      - name: Run smoke test (Windows)
        run: python .github/workflows/smoke_test.py

      - name: In-bundle self-test (Windows) — yt-dlp merge + whisper transcription
        env:
          STUDIOKIT_SELFTEST: "1"
        timeout-minutes: 10
        shell: cmd
        run: |
          dist\StudioKit\StudioKit.exe

      - name: Zip Windows exe
        run: Compress-Archive -Path dist\StudioKit -DestinationPath dist\StudioKit-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudioKit-windows
          path: dist\StudioKit-windows.zip

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: StudioKit-mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: StudioKit-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StudioKit-mac.zip
            StudioKit-windows.zip
